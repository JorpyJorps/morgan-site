<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Letters | Morgan's Magic Garden</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="theme-page-fairy">
    <div class="page-shell">
      <nav class="top-nav">
        <a class="brand-mark" href="/">🌸 Morgan's Magic Garden</a>
        <div class="nav-links">
          <a class="nav-chip" href="/">🌸 Home</a>
        </div>
      </nav>

      <main class="activity-shell letters-shell">
        <section class="activity-banner letters-banner">
          <div>
            <p class="letters-kicker">Fairy Forest</p>
            <h1>Letters</h1>
            <p class="letters-subtitle">Find the letter.</p>
          </div>
          <div class="activity-emoji" aria-hidden="true">🧚✨</div>
        </section>

        <section class="letters-status" aria-label="Letters game progress">
          <div class="letters-levels" aria-label="Letters levels">
            <button class="level-chip is-active" id="letters-level-one-button" type="button">ABC</button>
            <button class="level-chip" id="letters-level-two-button" type="button">abc</button>
          </div>
          <div class="letters-badge">
            <span class="letters-badge-label">Round</span>
            <strong id="letters-round-label">1 / 8</strong>
          </div>
          <div class="letters-badge">
            <span class="letters-badge-label">Stars</span>
            <strong id="letters-score-label">0</strong>
          </div>
        </section>

        <section class="letters-goal" aria-label="Today's goal">
          <div class="letters-goal-copy">
            <span class="letters-goal-kicker">Today's goal</span>
            <strong>Fill the flower path</strong>
          </div>
          <div class="letters-progress" id="letters-progress" aria-label="Letter goal progress"></div>
        </section>

        <section class="letters-board">
          <div class="letters-game-area">
            <div class="game-pirouette" id="gamePirouette">
              <div class="gp-bubble" id="gpBubble">
                <p id="gpBubbleText">🎵</p>
              </div>
              <div class="gp-cat" id="gpCat">🐱</div>
            </div>

            <div class="letters-game-content">
              <button class="letters-prompt" id="letters-prompt" type="button" aria-label="Hear the letter prompt">
                <span class="letters-prompt-icon">🔊</span>
                <span class="letters-prompt-hint">Hear it!</span>
              </button>

              <div class="letters-feedback" id="letters-feedback">
                <span class="letters-feedback-icon" id="letters-feedback-icon" aria-hidden="true"></span>
                <span id="letters-feedback-text"></span>
              </div>

              <div class="letters-options" id="letters-options" aria-label="Letter choices"></div>
            </div>
          </div>
        </section>

        <section class="letters-finish" id="letters-finish" hidden>
          <div class="letters-finish-card">
            <div class="letters-celebration" id="letters-celebration" aria-hidden="true">
              <div class="letters-rainbow-ring"></div>
              <div class="letters-shooting-star">⭐</div>
              <div class="letters-confetti letters-confetti-left">✨ 🌸 ⭐ 💖</div>
              <div class="letters-confetti letters-confetti-right">💖 ⭐ 🌸 ✨</div>
            </div>
            <div class="letters-finish-pirouette" aria-hidden="true">
              <div class="gp-bubble gp-finish-bubble">
                <p>Magnifique! 🌟</p>
              </div>
              <div class="gp-cat gp-finish-cat" id="gpFinishCat">🐱</div>
            </div>
            <div class="letters-finish-burst" aria-hidden="true">✨ 🌸 ⭐ 💖 ⭐ 🌸 ✨</div>
            <h2>You found them all!</h2>
            <p id="letters-finish-text">Morgan found every letter.</p>
            <div class="letters-finish-actions">
              <button class="button button-primary" id="letters-play-again-button" type="button">Play Again</button>
              <a class="button button-secondary" href="/">Garden Map</a>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script src="/script.js"></script>
    <script src="/activities/tracker.js"></script>
    <script src="/activities/letters.js"></script>
  </body>
</html>
