<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sticker Garden | Morgan's Magic Garden</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="theme-page-stickers">
    <div class="page-shell">
      <nav class="top-nav">
        <a class="brand-mark" href="/">🌸 Morgan's Magic Garden</a>
        <div class="nav-links">
          <a class="nav-chip" href="/activities/letters.html">Letters</a>
          <a class="nav-chip" href="/activities/memory-match.html">Memory Match</a>
        </div>
      </nav>

      <main class="activity-shell sticker-shell">
        <section class="activity-banner sticker-banner">
          <div>
            <p class="section-kicker">Magic Reward Garden</p>
            <h1>Sticker Garden</h1>
            <p>Tap a sparkly patch to place a sticker.</p>
          </div>
          <div class="activity-emoji" aria-hidden="true">🏆🌼</div>
        </section>

        <section class="sticker-status" aria-label="Sticker garden progress">
          <div class="sticker-badge">
            <span class="sticker-badge-label">Stars</span>
            <strong id="sticker-star-count">0</strong>
          </div>
          <div class="sticker-badge">
            <span class="sticker-badge-label">Unlocked</span>
            <strong id="sticker-unlocked-count">0</strong>
          </div>
        </section>

        <section class="sticker-layout">
          <div class="sticker-garden-stage">
            <div class="sticker-garden-scene" id="sticker-garden-scene">
              <button class="garden-slot" data-slot="0" type="button" aria-label="Garden spot one"></button>
              <button class="garden-slot" data-slot="1" type="button" aria-label="Garden spot two"></button>
              <button class="garden-slot" data-slot="2" type="button" aria-label="Garden spot three"></button>
              <button class="garden-slot" data-slot="3" type="button" aria-label="Garden spot four"></button>
              <button class="garden-slot" data-slot="4" type="button" aria-label="Garden spot five"></button>
              <button class="garden-slot" data-slot="5" type="button" aria-label="Garden spot six"></button>
            </div>
          </div>

          <div class="sticker-sidebar">
            <div class="sticker-panel">
              <div class="sticker-panel-header">
                <p class="section-kicker">Sticker Basket</p>
                <h2>Pick One</h2>
              </div>
              <div class="sticker-picker" id="sticker-picker" aria-live="polite"></div>
            </div>

            <div class="sticker-panel">
              <div class="sticker-panel-header">
                <p class="section-kicker">Little Wins</p>
                <h2>Recent Play</h2>
              </div>
              <div class="sticker-session-list" id="sticker-session-list" aria-live="polite"></div>
            </div>
          </div>
        </section>

        <section class="sticker-actions">
          <button class="button button-secondary" id="sticker-reset-button" type="button">Clear Garden</button>
          <a class="button button-primary" href="/">Garden Map</a>
        </section>
      </main>
    </div>
    <script src="/activities/tracker.js"></script>
    <script src="/activities/sticker-garden.js"></script>
  </body>
</html>
