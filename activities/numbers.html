<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Numbers | Morgan's Magic Garden</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="theme-page-unicorn">
    <div class="page-shell">
      <nav class="top-nav">
        <a class="brand-mark" href="/">🌸 Morgan's Magic Garden</a>
        <div class="nav-links">
          <a class="nav-chip" href="/">🌸 Home</a>
        </div>
      </nav>

      <main class="activity-shell numbers-shell">
        <section class="activity-banner numbers-banner">
          <div>
            <p class="numbers-kicker">Star Meadow</p>
            <h1>Numbers</h1>
            <p class="numbers-subtitle">Listen and find the number.</p>
          </div>
          <div class="activity-emoji" aria-hidden="true">🦄⭐</div>
        </section>

        <section class="numbers-status" aria-label="Numbers game progress">
          <div class="numbers-levels" id="numbers-levels" aria-label="Number ranges"></div>
          <div class="numbers-badge">
            <span class="numbers-badge-label">Round</span>
            <strong id="numbers-round-label">1 / 8</strong>
          </div>
          <div class="numbers-badge">
            <span class="numbers-badge-label">Stars</span>
            <strong id="numbers-score-label">0</strong>
          </div>
        </section>

        <section class="numbers-goal" aria-label="Today's goal">
          <div class="numbers-goal-copy">
            <span class="numbers-goal-kicker">Today's goal</span>
            <strong>Fill the star path</strong>
          </div>
          <div class="numbers-progress" id="numbers-progress" aria-label="Numbers goal progress"></div>
        </section>

        <section class="numbers-board">
          <div class="numbers-decor" aria-hidden="true">
            <span class="numbers-cloud numbers-cloud-left">☁️</span>
            <span class="numbers-cloud numbers-cloud-right">⭐</span>
          </div>

          <div class="numbers-game-area">
            <div class="game-pirouette" id="gamePirouette">
              <div class="gp-bubble" id="gpBubble">
                <p id="gpBubbleText">⭐</p>
              </div>
              <div class="gp-cat" id="gpCat">🐱</div>
            </div>

            <div class="numbers-game-content">
              <button class="numbers-prompt" id="numbers-prompt" type="button" aria-label="Hear the number">
                <span class="numbers-prompt-icon">🔊</span>
                <span class="numbers-prompt-hint">Hear it!</span>
              </button>

              <div class="numbers-tenframe" id="numbers-tenframe" aria-hidden="true"></div>

              <div class="numbers-feedback" id="numbers-feedback">
                <span class="numbers-feedback-icon" id="numbers-feedback-icon" aria-hidden="true">✨</span>
                <span id="numbers-feedback-text">Listen and find the number! ⭐</span>
              </div>

              <div class="numbers-options" id="numbers-options" aria-label="Number choices"></div>
            </div>
          </div>
        </section>

        <section class="numbers-finish" id="numbers-finish" hidden>
          <div class="numbers-finish-card">
            <div class="numbers-celebration" id="numbers-celebration" aria-hidden="true">
              <!-- SVG rainbow arc — 7 bands, renders crisply at any size -->
              <svg class="numbers-rainbow-svg" viewBox="0 0 340 170" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M 8 168 A 162 162 0 0 1 332 168" stroke="#c084fc" stroke-width="20" fill="none" stroke-linecap="round"/>
                <path d="M 26 168 A 144 144 0 0 1 314 168" stroke="#818cf8" stroke-width="18" fill="none" stroke-linecap="round"/>
                <path d="M 44 168 A 126 126 0 0 1 296 168" stroke="#38bdf8" stroke-width="18" fill="none" stroke-linecap="round"/>
                <path d="M 62 168 A 108 108 0 0 1 278 168" stroke="#34d399" stroke-width="18" fill="none" stroke-linecap="round"/>
                <path d="M 80 168 A 90 90 0 0 1 260 168"  stroke="#fbbf24" stroke-width="18" fill="none" stroke-linecap="round"/>
                <path d="M 98 168 A 72 72 0 0 1 242 168"  stroke="#fb923c" stroke-width="18" fill="none" stroke-linecap="round"/>
                <path d="M 116 168 A 54 54 0 0 1 224 168" stroke="#f472b6" stroke-width="18" fill="none" stroke-linecap="round"/>
              </svg>
              <div class="numbers-glitter-stage" id="numbersGlitterStage"></div>
            </div>
            <div class="numbers-finish-pirouette" aria-hidden="true">
              <div class="gp-bubble gp-finish-bubble">
                <p>Magnifique! 🌟</p>
              </div>
              <div class="gp-cat gp-finish-cat" id="gpFinishCat">🐱</div>
            </div>
            <div class="numbers-finish-burst" aria-hidden="true">⭐ 🌈 ⭐ 💖 ⭐ 🌈 ⭐</div>
            <h2>You found them all!</h2>
            <p id="numbers-finish-text">Morgan found every number.</p>
            <div class="numbers-finish-actions">
              <button class="button button-primary" id="numbers-play-again-button" type="button">Play Again</button>
              <a class="button button-secondary" href="/">Garden Map</a>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script src="/script.js"></script>
    <script src="/activities/tracker.js"></script>
    <script src="/activities/numbers.js"></script>
  </body>
</html>
